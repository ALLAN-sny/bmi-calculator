<!DOCTYPE html>
<html>
<head>
<title>Smart Health App</title>
<style>
body{font-family:Arial;text-align:center;background:#0f2027;color:white}
.page{display:none;padding:20px}
.active{display:block}
input{padding:10px;margin:5px;width:80%;border-radius:10px;border:none}
button{padding:10px 20px;border:none;border-radius:10px;background:cyan;font-weight:bold}
.card{background:rgba(255,255,255,0.1);padding:15px;border-radius:15px;margin:15px auto;max-width:300px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<button onclick="login()">Next</button>
</div>

<!-- WELCOME -->
<div id="welcome" class="page">
<h2>Welcome to Smart Health</h2>
<p>Eng. Allan | Biomedical Engineer</p>
<button onclick="show('form')">Start</button>
</div>

<!-- FORM -->
<div id="form" class="page">
<h2>Enter Details</h2>
<input id="name" placeholder="Name"><br>
<input id="age" type="number" placeholder="Age"><br>
<input id="height" type="number" placeholder="Height (m)"><br>
<input id="weight" type="number" placeholder="Weight (kg)"><br>
<button onclick="calc()">Next</button>
</div>

<!-- RESULT -->
<div id="resultPage" class="page">
<h2>Result</h2>
<div class="card" id="result"></div>
<button onclick="save()">Save</button>
<button onclick="showHistory()">History</button>
</div>

<!-- HISTORY -->
<div id="historyPage" class="page">
<h2>History</h2>
<div id="history"></div>
<button onclick="show('welcome')">Back</button>
</div>

<script>
let dataUser={};

// NAVIGATION
function show(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// LOGIN
function login(){
if(!user.value){
alert("Enter username");
return;
}
show('welcome');
}

// CALCULATION
function calc(){
let n=name.value;
let a=age.value;
let h=height.value;
let w=weight.value;

if(!n||!a||!h||!w){
alert("Fill all fields");
return;
}

let bmi=w/(h*h);
let status=bmi<18.5?"Underweight":bmi<25?"Normal":bmi<30?"Overweight":"Obese";

dataUser={n,a,bmi:bmi.toFixed(2),status};

document.getElementById("result").innerHTML=`
<h3>${n}</h3>
<p>Age: ${a}</p>
<p>BMI: ${dataUser.bmi}</p>
<p>Status: ${status}</p>
`;

show('resultPage');
}

// SAVE
function save(){
let arr=JSON.parse(localStorage.getItem("records"))||[];
arr.push(dataUser);
localStorage.setItem("records",JSON.stringify(arr));
alert("Saved!");
}

// HISTORY
function showHistory(){
let arr=JSON.parse(localStorage.getItem("records"))||[];
let h="";
arr.forEach(u=>{
h+=`
<div class="card">
<h4>${u.n}</h4>
<p>BMI: ${u.bmi}</p>
<p>${u.status}</p>
</div>`;
});
document.getElementById("history").innerHTML=h;
show('historyPage');
}
</script>

</body>
</html>
