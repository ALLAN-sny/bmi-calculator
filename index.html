<!DOCTYPE html>
<html>
<head>
  <title>Eng. Allan Health App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0072ff;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .brand {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <h1>🏥 Eng. Allan Health App</h1>
  <div class="brand">Biomedical Engineer | MUHAS</div>

  <div class="card">
    <h2>BMI Calculator</h2>

    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (m)">

    <button onclick="calculateBMI()">Check BMI</button>

    <p id="result"></p>
    <p id="advice"></p>
  </div>

  <footer>
    Developed by Eng. Allan (Biomedical Engineer - MUHAS) <br>
    ⚠️ For educational purposes only
  </footer>

<script>
function calculateBMI() {
  let w = document.getElementById("weight").value;
  let h = document.getElementById("height").value;

  let bmi = w / (h * h);
  let message = "";
  let advice = "";

  if (bmi < 18.5) {
    message = "Underweight";
    advice = "Eat nutritious foods and consult a specialist.";
  } else if (bmi < 25) {
    message = "Normal";
    advice = "Keep maintaining your healthy lifestyle!";
  } else {
    message = "Overweight";
    advice = "Exercise regularly and manage your diet.";
  }

  document.getElementById("result").innerText = "BMI: " + bmi.toFixed(2) + " (" + message + ")";
  document.getElementById("advice").innerText = advice;
}
</script>

</body>
</html>
