<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bionex Elite | Biomedical System</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2fe;
            --male-color: #4facfe;
            --female-color: #f093fb;
            --bg: #0b0f19;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, rgba(0,242,254,0.1), transparent);
            color: #e2e8f0;
            margin: 0;
            min-height: 100vh;
        }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Header Branding */
        .brand-header { text-align: center; padding: 20px 0; }
        .slogan { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        .dev-tag { font-size: 0.8rem; background: var(--glass); padding: 5px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); display: inline-block; margin-top: 5px; }

        /* Gender Selection */
        .gender-container { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
        .gender-card {
            background: var(--glass);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px;
            width: 100px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .gender-card img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.1); }
        .gender-card.selected-male { border-color: var(--male-color); background: rgba(79, 172, 254, 0.1); }
        .gender-card.selected-female { border-color: var(--female-color); background: rgba(240, 147, 251, 0.1); }

        /* UI Components */
        .card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid #2d3748; border-radius: 12px; padding: 12px; width: 100%; color: white; margin-top: 10px; box-sizing: border-box; }
        .btn-action { background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); color: #0b0f19; border: none; padding: 15px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }

        /* Result Styles */
        .result-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; }
        .bmi-display { font-size: 3rem; font-weight: 900; line-height: 1; margin: 10px 0; }
        
        /* Navigation */
        nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        nav div { color: #64748b; font-size: 0.65rem; text-align: center; cursor: pointer; }
        nav div.active-nav { color: var(--accent); }
        nav i { font-size: 1.2rem; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <div class="slogan">Precision in Health • Engineering in Life</div>
        <h1 style="margin:0;">BIONEX <span style="color:var(--accent)">360</span></h1>
        <div class="dev-tag">Eng. Allan | MUHAS</div>
    </div>

    <div id="home" class="page active">
        <div class="card" style="text-align: center;">
            <i class="fas fa-dna" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
            <h3>System Initialized</h3>
            <p style="color: #94a3b8; font-size: 0.9rem;">Advanced biomedical diagnostic tool for real-time body mass analysis and physiological tracking.</p>
        </div>
        <button class="btn-action" onclick="showPage('calc')">START DIAGNOSTIC <i class="fas fa-bolt"></i></button>
    </div>

    <div id="calc" class="page">
        <div class="card">
            <h3 style="margin-top:0"><i class="fas fa-user-circle"></i> Profile Data</h3>
            
            <label style="font-size: 0.8rem; color: var(--accent);">SELECT GENDER</label>
            <div class="gender-container">
                <div class="gender-card" id="maleBox" onclick="selectGender('male')">
                    <img src="https://cdn-icons-png.flaticon.com/512/4042/4042356.png" alt="Male">
                    <div style="font-size: 0.8rem; font-weight: bold;">MALE</div>
                </div>
                <div class="gender-card" id="femaleBox" onclick="selectGender('female')">
                    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png" alt="Female">
                    <div style="font-size: 0.8rem; font-weight: bold;">FEMALE</div>
                </div>
            </div>

            <input id="name" class="input-box" placeholder="Full Name">
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input id="h" type="number" step="0.01" class="input-box" placeholder="Height (m)">
                <input id="w" type="number" class="input-box" placeholder="Weight (kg)">
            </div>
            <button class="btn-action" style="margin-top: 20px;" onclick="runDiagnostic()">ANALYZE NOW</button>
        </div>
    </div>

    <div id="result" class="page">
        <div class="card" style="text-align: center;">
            <img id="resAvatar" src="" class="result-avatar">
            <div id="resName" style="font-weight: bold; color: var(--accent);"></div>
            <div class="bmi-display" id="resBMI">00.0</div>
            <div id="resStatus" style="font-weight: 800; letter-spacing: 2px;">STATUS</div>
            
            <div class="card" style="background: rgba(0,0,0,0.2); text-align: left; margin-top: 20px; border-left: 4px solid var(--accent);">
                <i class="fas fa- stethoscope" style="color: var(--accent);"></i> <b>Clinical Advice:</b>
                <p id="resAdvice" style="font-size: 0.85rem; color: #cbd5e1; margin-top: 5px;"></p>
            </div>
        </div>
        <div class="card"><canvas id="bmiChart"></canvas></div>
        <button class="btn-action" onclick="saveRecord()"><i class="fas fa-save"></i> ARCHIVE REPORT</button>
    </div>

    <div id="history" class="page">
        <h3><i class="fas fa-history"></i> Encrypted Logs</h3>
        <div id="logList"></div>
    </div>
</div>

<nav>
    <div onclick="showPage('home')" id="n-home" class="active-nav"><i class="fas fa-home"></i>Home</div>
    <div onclick="showPage('calc')" id="n-calc"><i class="fas fa-plus-circle"></i>New</div>
    <div onclick="showPage('history')" id="n-history"><i class="fas fa-database"></i>Logs</div>
</nav>

<script>
    let selectedGender = 'male';
    let chart = null;

    function selectGender(g) {
        selectedGender = g;
        document.getElementById('maleBox').classList.toggle('selected-male', g === 'male');
        document.getElementById('femaleBox').classList.toggle('selected-female', g === 'female');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav div').forEach(d => d.classList.remove('active-nav'));
        document.getElementById('n-' + (id==='result'?'calc':id)).classList.add('active-nav');
        if(id === 'history') loadLogs();
    }

    function runDiagnostic() {
        const name = document.getElementById('name').value;
        const h = parseFloat(document.getElementById('h').value);
        const w = parseFloat(document.getElementById('w').value);

        if(!name || !h || !w) return alert("Incomplete parameters.");

        const bmi = (w / (h * h)).toFixed(1);
        let color, status, advice;

        if(bmi < 18.5) { color = "#f1c40f"; status = "UNDERWEIGHT"; advice = "Warning: Nutrient absorption might be suboptimal. Increase caloric density."; }
        else if(bmi < 25) { color = "#2ecc71"; status = "OPTIMAL"; advice = "Homeostasis detected. Physiological parameters are within clinical range."; }
        else if(bmi < 30) { color = "#e67e22"; status = "OVERWEIGHT"; advice = "Metabolic strain identified. Recommend controlled cardio and glucose monitoring."; }
        else { color = "#e74c3c"; status = "OBESE"; advice = "Critical alert. High risk of cardiovascular complications. Urgent lifestyle shift required."; }

        document.getElementById('resAvatar').src = selectedGender === 'male' ? 'https://cdn-icons-png.flaticon.com/512/4042/4042356.png' : 'https://cdn-icons-png.flaticon.com/512/4140/4140047.png';
        document.getElementById('resName').innerText = `SUBJECT: ${name.toUpperCase()}`;
        document.getElementById('resBMI').innerText = bmi;
        document.getElementById('resBMI').style.color = color;
        document.getElementById('resStatus').innerText = status;
        document.getElementById('resStatus').style.color = color;
        document.getElementById('resAdvice').innerText = advice;

        showPage('result');
        initChart(bmi, color);
        window.latest = { name, bmi, gender: selectedGender, date: new Date().toLocaleDateString() };
    }

    function initChart(val, color) {
        const ctx = document.getElementById('bmiChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['BMI Value'], datasets: [{ data: [val], backgroundColor: color, borderRadius: 10 }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 40 } } }
        });
    }

    function saveRecord() {
        let logs = JSON.parse(localStorage.getItem('bionex_final') || '[]');
        logs.unshift(window.latest);
        localStorage.setItem('bionex_final', JSON.stringify(logs));
        alert("Clinical data secured.");
    }

    function loadLogs() {
        const logs = JSON.parse(localStorage.getItem('bionex_final') || '[]');
        document.getElementById('logList').innerHTML = logs.map(l => `
            <div class="card" style="display:flex; align-items:center; gap:15px; padding:12px;">
                <img src="${l.gender==='male'?'https://cdn-icons-png.flaticon.com/512/4042/4042356.png':'https://cdn-icons-png.flaticon.com/512/4140/4140047.png'}" style="width:40px; height:40px;">
                <div style="flex:1"><b>${l.name}</b><br><small>${l.date}</small></div>
                <div style="color:var(--accent); font-weight:bold;">${l.bmi}</div>
            </div>
        `).join('') || '<p style="text-align:center">No logs found.</p>';
    }
</script>
</body>
</html>
